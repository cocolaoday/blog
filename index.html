<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 我的待辦清單</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- ===== Supabase SDK ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ===== CSS 變數定義 ===== */
    :root {
      --blue:       #2196F3;
      --blue-dark:  #1565C0;
      --blue-light: #E3F2FD;
      --green:      #43A047;
      --green-dark: #2E7D32;
      --red:        #E53935;
      --red-dark:   #B71C1C;
      --bg:         #F5F5F5;
      --card:       #FFFFFF;
      --text:       #1A1A2E;
      --text-muted: #9E9E9E;
      --done-bg:    #F0F0F0;
      --done-text:  #BDBDBD;
      --shadow:     0 4px 20px rgba(33,150,243,0.10);
      --shadow-hover: 0 8px 32px rgba(33,150,243,0.18);
      --radius:     16px;
      --radius-sm:  10px;
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(33,150,243,0.07) 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(33,150,243,0.05) 0%, transparent 50%);
    }

    .app {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== 標題區 ===== */
    .header {
      text-align: center;
      padding: 36px 24px 24px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--blue), #42A5F5, var(--blue));
    }
    .header h1 { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .header p  { font-size: 0.875rem; color: var(--text-muted); margin-top: 6px; }

    /* ===== 連線狀態標籤 ===== */
    .db-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #E8F5E9;
      color: var(--green-dark);
      transition: background var(--transition), color var(--transition);
    }
    .db-badge.connecting { background: #FFF8E1; color: #F57F17; }
    .db-badge.error      { background: #FFEBEE; color: var(--red-dark); }
    .db-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.8s infinite;
    }
    .db-badge.connecting .dot { animation: pulse 0.8s infinite; }
    .db-badge.error .dot { animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ===== 輸入區 ===== */
    .input-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: box-shadow var(--transition);
    }
    .input-card:focus-within { box-shadow: var(--shadow-hover); }

    #todo-input {
      flex: 1;
      border: 2px solid #E0E0E0;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }
    #todo-input::placeholder { color: var(--text-muted); }
    #todo-input:focus { border-color: var(--blue); background: #fff; }

    #add-btn {
      padding: 12px 22px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 2px 10px rgba(33,150,243,0.3);
    }
    #add-btn:hover  { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(33,150,243,0.4); }
    #add-btn:active { transform: translateY(0); }
    #add-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ===== 統計區 ===== */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      padding: 18px 12px 14px;
      text-align: center;
      border-bottom: 4px solid transparent;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .stat-card.total   { border-color: var(--blue); }
    .stat-card.done    { border-color: var(--green); }
    .stat-card.pending { border-color: #FF9800; }

    .stat-num { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; line-height: 1; display: block; }
    .stat-card.total   .stat-num { color: var(--blue); }
    .stat-card.done    .stat-num { color: var(--green); }
    .stat-card.pending .stat-num { color: #FF9800; }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 5px; display: block; font-weight: 500; }

    /* ===== 清單區 ===== */
    .list-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .list-header { padding: 16px 20px 12px; border-bottom: 1px solid #F0F0F0; font-weight: 700; font-size: 0.9rem; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }

    #todo-list { list-style: none; max-height: 420px; overflow-y: auto; padding: 8px 0; }
    #todo-list::-webkit-scrollbar { width: 6px; }
    #todo-list::-webkit-scrollbar-track { background: transparent; }
    #todo-list::-webkit-scrollbar-thumb { background: #DDD; border-radius: 3px; }
    #todo-list::-webkit-scrollbar-thumb:hover { background: #BDBDBD; }

    /* ===== 待辦項目 ===== */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #FAFAFA;
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
      transition: background var(--transition), opacity var(--transition);
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: #FAFAFA; }
    .todo-item.completed { background: var(--done-bg); opacity: 0.8; }
    .todo-item.completed:hover { background: #EBEBEB; }

    /* 載入中遮罩 */
    .todo-item.loading { pointer-events: none; opacity: 0.5; }

    .todo-status {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid #DDD;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      transition: border-color var(--transition), background var(--transition);
    }
    .todo-item.completed .todo-status { border-color: var(--green); background: var(--green); color: #fff; }

    .todo-text { flex: 1; font-size: 0.95rem; color: var(--text); word-break: break-word; line-height: 1.5; transition: color var(--transition), text-decoration var(--transition); }
    .todo-item.completed .todo-text { color: var(--done-text); text-decoration: line-through; }

    .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-done, .btn-del {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), opacity var(--transition);
      white-space: nowrap;
    }
    .btn-done { background: #E8F5E9; color: var(--green-dark); }
    .btn-done:hover { background: var(--green); color: #fff; transform: scale(1.05); }
    .btn-del  { background: #FFEBEE; color: var(--red-dark); }
    .btn-del:hover  { background: var(--red); color: #fff; transform: scale(1.05); }
    .todo-item.completed .btn-done { background: #FFF3E0; color: #E65100; }
    .todo-item.completed .btn-done:hover { background: #FF9800; color: #fff; }

    /* ===== 空狀態 ===== */
    .empty-state { text-align: center; padding: 52px 20px; color: var(--text-muted); }
    .empty-state .empty-icon { font-size: 3.5rem; display: block; margin-bottom: 16px; opacity: 0.6; }
    .empty-state p { font-size: 0.95rem; line-height: 1.7; }

    /* ===== 載入骨架 ===== */
    .skeleton-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid #FAFAFA;
    }
    .skeleton-circle { width: 22px; height: 22px; border-radius: 50%; background: #EEE; flex-shrink: 0; animation: shimmer 1.4s infinite; }
    .skeleton-line   { flex: 1; height: 14px; border-radius: 6px; background: #EEE; animation: shimmer 1.4s infinite; }
    .skeleton-btn    { width: 60px; height: 28px; border-radius: 8px; background: #EEE; animation: shimmer 1.4s infinite; }
    @keyframes shimmer {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ===== 動畫 ===== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item.removing { animation: slideOut 0.28s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes slideOut {
      to { opacity: 0; transform: translateX(24px); max-height: 0; padding: 0 20px; }
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333; color: #fff;
      padding: 10px 22px; border-radius: 24px;
      font-size: 0.875rem; opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error-toast { background: var(--red-dark); }

    /* ===== 響應式 ===== */
    @media (max-width: 480px) {
      body { padding: 16px 10px 48px; }
      .todo-item { padding: 12px 14px; gap: 10px; }
      .btn-done, .btn-del { padding: 5px 9px; font-size: 0.72rem; }
      .stat-num { font-size: 1.6rem; }
      #add-btn { padding: 12px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- 標題 -->
  <header class="header">
    <h1>📝 我的待辦清單</h1>
    <p>保持專注，一次完成一件事</p>
    <!-- 資料庫連線狀態 -->
    <div class="db-badge connecting" id="db-badge">
      <span class="dot"></span>
      <span id="db-label">連線中…</span>
    </div>
  </header>

  <!-- 輸入區 -->
  <div class="input-card">
    <input id="todo-input" type="text" placeholder="輸入新的待辦事項…" maxlength="100" autocomplete="off" />
    <button id="add-btn" disabled>＋ 新增</button>
  </div>

  <!-- 統計區 -->
  <div class="stats" role="region" aria-label="統計資訊">
    <div class="stat-card total">
      <span class="stat-num" id="stat-total">—</span>
      <span class="stat-label">總任務數</span>
    </div>
    <div class="stat-card done">
      <span class="stat-num" id="stat-done">—</span>
      <span class="stat-label">已完成</span>
    </div>
    <div class="stat-card pending">
      <span class="stat-num" id="stat-pending">—</span>
      <span class="stat-label">未完成</span>
    </div>
  </div>

  <!-- 清單區 -->
  <div class="list-card">
    <div class="list-header">待辦事項清單</div>
    <ul id="todo-list" aria-label="待辦事項清單">
      <!-- 骨架載入畫面 -->
      <li class="skeleton-item"><div class="skeleton-circle"></div><div class="skeleton-line"></div><div class="skeleton-btn"></div></li>
      <li class="skeleton-item"><div class="skeleton-circle"></div><div class="skeleton-line" style="width:60%"></div><div class="skeleton-btn"></div></li>
      <li class="skeleton-item"><div class="skeleton-circle"></div><div class="skeleton-line" style="width:80%"></div><div class="skeleton-btn"></div></li>
    </ul>
  </div>

</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script>
  // ===================================================
  // ===== Supabase 初始化 =====
  // ===================================================
  const SUPABASE_URL = 'https://irtxrlswfxkdejugeywu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BsFeOT7Z0Dh48FCUIUM-Uw_fRW6Zvyo';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ===== 本地狀態（從 Supabase 同步） =====
  let todos = [];

  // ===== DOM 元素 =====
  const input      = document.getElementById('todo-input');
  const addBtn     = document.getElementById('add-btn');
  const list       = document.getElementById('todo-list');
  const statTotal  = document.getElementById('stat-total');
  const statDone   = document.getElementById('stat-done');
  const statPending= document.getElementById('stat-pending');
  const toast      = document.getElementById('toast');
  const dbBadge    = document.getElementById('db-badge');
  const dbLabel    = document.getElementById('db-label');

  // ===================================================
  // ===== 連線狀態 Badge =====
  // ===================================================
  function setDbStatus(status) {
    dbBadge.className = 'db-badge ' + status;
    const labels = { connecting: '連線中…', connected: '已連線 Supabase', error: '連線失敗' };
    dbLabel.textContent = labels[status] || status;
  }

  // ===================================================
  // ===== Toast 提示 =====
  // ===================================================
  let toastTimer;
  function showToast(msg, isError = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error-toast' : '');
    toastTimer = setTimeout(() => toast.className = 'toast', 2400);
  }

  // ===================================================
  // ===== 更新統計 =====
  // ===================================================
  function updateStats() {
    const total   = todos.length;
    const done    = todos.filter(t => t.done).length;
    statTotal.textContent   = total;
    statDone.textContent    = done;
    statPending.textContent = total - done;
  }

  // ===================================================
  // ===== 防 XSS =====
  // ===================================================
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===================================================
  // ===== 渲染清單 =====
  // ===================================================
  function render() {
    list.innerHTML = '';

    if (todos.length === 0) {
      list.innerHTML = `
        <li class="empty-state">
          <span class="empty-icon">🗒️</span>
          <p>還沒有任何待辦事項<br>快來新增第一個任務吧！</p>
        </li>`;
      updateStats();
      return;
    }

    todos.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' completed' : '');
      li.dataset.id = todo.id;

      li.innerHTML = `
        <div class="todo-status">${todo.done ? '✓' : ''}</div>
        <span class="todo-text">${escapeHtml(todo.text)}</span>
        <div class="todo-actions">
          <button class="btn-done" data-id="${todo.id}" title="${todo.done ? '復原任務' : '標記完成'}">
            ${todo.done ? '↩ 復原' : '✓ 完成'}
          </button>
          <button class="btn-del" data-id="${todo.id}" title="刪除此任務">✕ 刪除</button>
        </div>`;

      list.appendChild(li);
    });

    updateStats();
  }

  // ===================================================
  // ===== [READ] 從 Supabase 讀取所有資料 =====
  // ===================================================
  async function loadTodos() {
    setDbStatus('connecting');
    try {
      const { data, error } = await db
        .from('todos')
        .select('*')
        .order('created_at', { ascending: false }); // 最新的排最前

      if (error) throw error;

      todos = data;
      render();
      setDbStatus('connected');
      addBtn.disabled = false;          // 載入完成後啟用新增按鈕
    } catch (err) {
      console.error('載入失敗：', err);
      setDbStatus('error');
      showToast('❌ 無法連線資料庫：' + err.message, true);
      list.innerHTML = `<li class="empty-state"><span class="empty-icon">⚠️</span><p>資料載入失敗<br>請確認 Supabase 設定與網路連線</p></li>`;
    }
  }

  // ===================================================
  // ===== [CREATE] 新增待辦事項 =====
  // ===================================================
  async function addTodo() {
    const text = input.value.trim();
    if (!text) {
      input.focus();
      input.style.borderColor = '#E53935';
      setTimeout(() => input.style.borderColor = '', 800);
      return;
    }

    // 立即清空輸入框，UX 更流暢
    input.value = '';
    addBtn.disabled = true;
    input.disabled = true;

    try {
      const { data, error } = await db
        .from('todos')
        .insert([{ text, done: false }])  // 新增一筆記錄
        .select()
        .single();

      if (error) throw error;

      // 插入到本地陣列最前面，不需重新整理整個清單
      todos.unshift(data);
      render();
      showToast('✅ 已新增：' + text);
    } catch (err) {
      console.error('新增失敗：', err);
      showToast('❌ 新增失敗：' + err.message, true);
    } finally {
      addBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }

  // ===================================================
  // ===== [UPDATE] 切換完成狀態 =====
  // ===================================================
  async function toggleDone(id, liEl) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;

    const newDone = !todo.done;
    liEl.classList.add('loading');  // 操作中遮罩

    try {
      const { error } = await db
        .from('todos')
        .update({ done: newDone })  // 只更新 done 欄位
        .eq('id', id);

      if (error) throw error;

      // 更新本地狀態
      todo.done = newDone;
      render();
      showToast(newDone ? '🎉 已完成！' : '↩ 已復原');
    } catch (err) {
      console.error('更新失敗：', err);
      showToast('❌ 更新失敗：' + err.message, true);
      liEl.classList.remove('loading');
    }
  }

  // ===================================================
  // ===== [DELETE] 刪除待辦事項 =====
  // ===================================================
  async function deleteTodo(id, liEl) {
    liEl.classList.add('removing');   // 播放滑出動畫

    try {
      const { error } = await db
        .from('todos')
        .delete()
        .eq('id', id);                // 依 id 刪除指定列

      if (error) throw error;

      setTimeout(() => {
        todos = todos.filter(t => t.id !== id);
        render();
      }, 260);  // 等動畫結束再移除 DOM

      showToast('🗑️ 已刪除');
    } catch (err) {
      console.error('刪除失敗：', err);
      liEl.classList.remove('removing');
      showToast('❌ 刪除失敗：' + err.message, true);
    }
  }

  // ===================================================
  // ===== 即時同步（Realtime）=====
  // 監聽資料庫變更，多裝置/分頁自動同步
  // ===================================================
  function subscribeRealtime() {
    db.channel('todos-channel')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'todos' },
        payload => {
          // 當其他分頁/裝置做了變更，自動重新載入
          console.log('🔄 Realtime 更新：', payload.eventType);
          loadTodos();
        }
      )
      .subscribe();
  }

  // ===================================================
  // ===== 事件監聽 =====
  // ===================================================
  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  // 事件代理：完成 / 刪除按鈕
  list.addEventListener('click', e => {
    const doneBtn = e.target.closest('.btn-done');
    const delBtn  = e.target.closest('.btn-del');
    const liEl    = e.target.closest('.todo-item');

    if (doneBtn && liEl) {
      toggleDone(doneBtn.dataset.id, liEl);
    } else if (delBtn && liEl) {
      deleteTodo(delBtn.dataset.id, liEl);
    }
  });

  // ===================================================
  // ===== 初始化 =====
  // ===================================================
  loadTodos();
  subscribeRealtime();
</script>
</body>
</html>
